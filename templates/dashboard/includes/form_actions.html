{% comment %}Compact action row — right-aligned inline Save + Cancel. Required context: submit_label, cancel_href{% endcomment %}
<div style="display:flex;justify-content:flex-end;align-items:center;gap:0.375rem;padding-top:1.25rem;border-top:1px solid var(--dash-border);">
  <a href="{{ cancel_href }}" class="dash-btn">Cancel</a>
  <button type="submit" class="dash-btn dash-btn--dark">{{ submit_label }}</button>
</div>
