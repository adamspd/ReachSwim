<div class="booking-options">
  {% for loc in locations %}
  <button
    type="button"
    class="booking-location-card"
    hx-get="{% url 'booking:htmx_dates' session_type.pk loc.pk %}"
    hx-target="#dates-target"
    hx-swap="innerHTML"
    onclick="selectOption(this, 'location')"
  >
    <div class="booking-option-name">{{ loc.name }}</div>
    <div class="booking-option-desc">{{ loc.address }}</div>
    <div class="booking-option-meta">
      {% if loc.has_parking %}<span>Parking</span>{% endif %}
      {% if loc.has_hoist %}<span>Pool hoist</span>{% endif %}
    </div>
  </button>
  {% empty %}
  <p class="booking-empty">No locations available for this session type.</p>
  {% endfor %}
</div>
