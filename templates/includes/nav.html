{% load static %}
<header class="site-nav" id="site-nav">
  <div class="container nav-inner">
    <a href="{% url 'pages:home' %}" class="nav-logo">
      {% if site_config.logo %}
      <img src="{{ site_config.logo.url }}" alt="{{ site_config.site_name }}" height="56">
      {% else %}
      <span class="h-display" style="font-size: 24px;">{{ site_config.site_name }}</span>
      {% endif %}
    </a>

    <nav class="nav-links">
      <a href="{% url 'pages:home' %}">Home</a>
      <a href="{% url 'booking:packages' %}">Packages</a>
      <a href="{% url 'legal:contact' %}">Contact</a>
    </nav>

    <div class="nav-actions">
      {% if user.is_authenticated %}
        {% if user.can_access_dashboard %}
        <a href="{% url 'dashboard:home' %}" class="nav-account-link" title="Dashboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
        </a>
        {% else %}
        <a href="{% url 'accounts:profile' %}" class="nav-account-link" title="My account">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </a>
        {% endif %}
      {% else %}
      <a href="{% url 'accounts:login' %}" class="nav-account-link" title="Log in">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
      </a>
      {% endif %}
      <button type="button" class="cart-toggle" onclick="toggleCartDrawer()" aria-label="Shopping cart">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span id="cart-badge-target"
              hx-get="{% url 'payments:cart_badge' %}"
              hx-trigger="load, cartUpdated from:body"
              hx-swap="innerHTML">
        </span>
      </button>
      <a href="{% url 'booking:page' %}" class="btn btn-primary btn-sm nav-cta">Book a session</a>
    </div>
  </div>
</header>

<!-- Cart drawer (slides from right) -->
<div class="cart-drawer-overlay" id="cart-overlay" onclick="toggleCartDrawer()"></div>
<aside class="cart-drawer" id="cart-drawer">
  <div class="cart-drawer-header">
    <h2>Your cart</h2>
    <button type="button" class="cart-drawer-close" onclick="toggleCartDrawer()">&times;</button>
  </div>
  <div id="cart-drawer-content">
    {# Populated via JS fetch on drawer open #}
  </div>
</aside>
