{% load static %}
<header class="site-nav" id="site-nav">
  <div class="container nav-inner">
    <a href="{% url 'pages:home' %}" class="nav-logo">
      {% if site_config.logo %}
      <img src="{{ site_config.logo.url }}" alt="{{ site_config.site_name }}" height="56">
      {% else %}
      <span class="h-display" style="font-size: 24px;">{{ site_config.site_name }}</span>
      {% endif %}
    </a>

    <nav class="nav-links">
      <a href="{% url 'pages:home' %}">Home</a>
      <a href="{% url 'legal:contact' %}">Contact</a>
    </nav>

    <div class="nav-actions">
      <button type="button" class="cart-toggle" onclick="toggleCartDrawer()" aria-label="Shopping cart">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span id="cart-badge-target"
              hx-get="{% url 'payments:cart_badge' %}"
              hx-trigger="load, cartUpdated from:body"
              hx-swap="innerHTML">
        </span>
      </button>
      <a href="{% url 'booking:page' %}" class="btn btn-primary btn-sm nav-cta">Book a session</a>
    </div>
  </div>
</header>

<!-- Cart drawer (slides from right) -->
<div class="cart-drawer-overlay" id="cart-overlay" onclick="toggleCartDrawer()"></div>
<aside class="cart-drawer" id="cart-drawer">
  <div class="cart-drawer-header">
    <h2>Your cart</h2>
    <button type="button" class="cart-drawer-close" onclick="toggleCartDrawer()">&times;</button>
  </div>
  <div id="cart-drawer-content">
    {# Populated via JS fetch on drawer open #}
  </div>
</aside>
